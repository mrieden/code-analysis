<!DOCTYPE html>
<html lang="en" class="">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Code Analyzer</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --color-background: #FAFAFA;
            --color-ui-panels: #FFFFFF;
            --color-accent-primary: #7C3AED;
            --color-accent-secondary: #A855F7;
            --color-text-primary: #1E1B2E;
            --color-text-secondary: #6B6480;
            --color-status-success: #16A34A;
            --color-status-warning: #F97316;
            --color-status-error: #DC2626;
            --color-border: #E8E4F0;
        }

        .dark {
            --color-background: #09090b;
            --color-ui-panels: #131316;
            --color-accent-primary: #d4af37;
            --color-accent-secondary: #e6c85b;
            --color-text-primary: #f4f4f5;
            --color-text-secondary: #71717a;
            --color-status-success: #10b981;
            --color-status-warning: #f59e0b;
            --color-status-error: #f43f5e;
            --color-border: #1f1f23;
        }

        /* 🔥 LIGHT MODE BACKGROUND */
        body {
            background-color: var(--color-background);
            background-image: url('/images/lightmode.png');
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            transition: background-image 0.5s ease-in-out;
        }

        /* 🔥 DARK MODE BACKGROUND */
        html.dark body {
            background-image: url('/images/darkmode.png');
        }
    </style>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'background': 'var(--color-background)',
                        'ui-panels': 'var(--color-ui-panels)',
                        'accent-primary': 'var(--color-accent-primary)',
                        'accent-secondary': 'var(--color-accent-secondary)',
                        'text-primary': 'var(--color-text-primary)',
                        'text-secondary': 'var(--color-text-secondary)',
                        'status-success': 'var(--color-status-success)',
                        'status-warning': 'var(--color-status-warning)',
                        'status-error': 'var(--color-status-error)',
                        'border-color': 'var(--color-border)',
                    },
                    fontFamily: {
                        sans: ['system-ui', 'sans-serif'],
                        mono: ['Fira Code', 'Courier New', 'monospace'],
                    }
                },
            },
        };
    </script>

    <script type="importmap">
        {
          "imports": {
            "react": "https://aistudiocdn.com/react@^19.2.0",
            "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
            "react/": "https://aistudiocdn.com/react@^19.2.0/"
          }
        }
    </script>
</head>

<body class="font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
